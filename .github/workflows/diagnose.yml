name: Diagnose VPS (read-only)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect server state via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          capture_stdout: true
          script: |
            echo '=== PM2 LIST ==='
            pm2 list 2>&1 || true
            echo
            echo '=== PM2 DESCRIBE skinclinic ==='
            pm2 describe skinclinic 2>&1 | grep -E 'script path|exec cwd|status|name|uptime|PORT|port' || true
            echo
            echo '=== PM2 DESCRIBE clinicea-call ==='
            pm2 describe clinicea-call 2>&1 | grep -E 'script path|exec cwd|status|name|uptime|PORT|port' || true
            echo
            echo '=== NGINX proxy_pass lines ==='
            sudo grep -rhE 'proxy_pass|server_name|listen' /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null || echo '(no nginx config accessible)'
            echo
            echo '=== Ports listened on by node processes ==='
            sudo ss -ltnp 2>/dev/null | grep -E 'node|3000|3001|8080' || echo '(ss not available or no node ports)'
            echo
            echo '=== WA: last 200 lines of skinclinic logs ==='
            pm2 logs skinclinic --lines 200 --nostream 2>&1 | tail -200 || true
            echo
            echo '=== WA: lines mentioning WhatsApp / WA / QR / puppeteer ==='
            pm2 logs skinclinic --lines 500 --nostream 2>&1 | grep -iE 'whatsapp|^\[.*WA |QR|puppet|chromium|webVersion|auth_failure|disconnect|timeout' | tail -80 || true
            echo
            echo '=== WA: auth session on disk ==='
            ls -la ~/Clinic-Call-Dashboard/.wwebjs_auth/session 2>&1 | head -10 || echo '(no session dir)'
            ls -la ~/Clinic-Call-Dashboard/.wwebjs_cache 2>&1 | head -10 || echo '(no cache dir)'
