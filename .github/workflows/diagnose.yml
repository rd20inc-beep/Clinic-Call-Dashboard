name: Diagnose VPS (read-only)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect server state via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          capture_stdout: true
          script: |
            echo '=== PM2 LIST ==='
            pm2 list 2>&1 || true
            echo
            echo '=== PM2 DESCRIBE skinclinic ==='
            pm2 describe skinclinic 2>&1 | grep -E 'script path|exec cwd|status|name|uptime|PORT|port' || true
            echo
            echo '=== PM2 DESCRIBE clinicea-call ==='
            pm2 describe clinicea-call 2>&1 | grep -E 'script path|exec cwd|status|name|uptime|PORT|port' || true
            echo
            echo '=== NGINX proxy_pass lines ==='
            sudo grep -rhE 'proxy_pass|server_name|listen' /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null || echo '(no nginx config accessible)'
            echo
            echo '=== Ports listened on by node processes ==='
            sudo ss -ltnp 2>/dev/null | grep -E 'node|3000|3001|8080' || echo '(ss not available or no node ports)'
            echo
            echo '=== WA: log lines since most recent "Server started" ==='
            # Slice the PM2 buffer to just the current process lifetime so we
            # don't conflate errors from a prior session with current state.
            pm2 logs skinclinic --lines 2000 --nostream 2>&1 \
              | awk '/Server started on port/{seen=NR} {lines[NR]=$0} END{for(i=seen;i<=NR;i++)print lines[i]}' \
              | tail -120 || true
            echo
            echo '=== WA: auth session on disk ==='
            ls -la ~/Clinic-Call-Dashboard/.wwebjs_auth/session 2>&1 | head -10 || echo '(no session dir)'
            ls -la ~/Clinic-Call-Dashboard/.wwebjs_cache 2>&1 | head -10 || echo '(no cache dir)'
            echo
            echo '=== WA: send queue counts from calls.db ==='
            sqlite3 ~/Clinic-Call-Dashboard/calls.db "
              SELECT 'approved_outgoing', COUNT(*) FROM wa_messages WHERE direction='out' AND status='approved'
              UNION ALL SELECT 'sending_outgoing', COUNT(*) FROM wa_messages WHERE direction='out' AND status='sending'
              UNION ALL SELECT 'pending_approval', COUNT(*) FROM wa_messages WHERE direction='out' AND status='pending'
              UNION ALL SELECT 'sent_last_hour', COUNT(*) FROM wa_messages WHERE direction='out' AND status='sent' AND sent_at > datetime('now','-1 hour')
              UNION ALL SELECT 'sent_last_24h', COUNT(*) FROM wa_messages WHERE direction='out' AND status='sent' AND sent_at > datetime('now','-24 hours')
              UNION ALL SELECT 'failed_total', COUNT(*) FROM wa_messages WHERE direction='out' AND status IN ('failed','expired');
            " 2>&1 || echo '(sqlite3 query failed — see error above)'
            echo
            echo '=== WA: nginx proxy_read_timeout for skinclinic site ==='
            sudo grep -hE 'proxy_read_timeout|proxy_send_timeout|proxy_connect_timeout' /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ -r 2>/dev/null || echo '(no proxy timeouts set, using nginx defaults)'
