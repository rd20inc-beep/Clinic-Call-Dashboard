name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo timedatectl set-timezone Asia/Karachi 2>/dev/null || true
            if [ ! -d ~/Clinic-Call-Dashboard ]; then
              git clone https://github.com/rd20inc-beep/Clinic-Call-Dashboard.git ~/Clinic-Call-Dashboard
            fi
            cd ~/Clinic-Call-Dashboard
            git remote set-url origin https://github.com/rd20inc-beep/Clinic-Call-Dashboard.git
            git fetch origin main
            git reset --hard origin/main
            npm install --omit=dev
            # Orphan 'clinicea-call' from old deploys can't bind port 3000
            # (skinclinic owns it). Remove it so pm2 list stays clean.
            pm2 delete clinicea-call 2>/dev/null || true
            # skinclinic is the process actually behind nginx (proxy_pass :3000).
            # Reload = zero-downtime restart so in-flight requests and Socket.IO
            # connections survive. Fall back to start on first-ever deploy.
            if pm2 describe skinclinic >/dev/null 2>&1; then
              TZ=Asia/Karachi pm2 reload skinclinic --update-env
            else
              TZ=Asia/Karachi pm2 start src/server.js --name skinclinic
            fi
            pm2 save
