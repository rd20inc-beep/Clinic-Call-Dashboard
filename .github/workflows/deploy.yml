name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ ! -d ~/Clinic-Call-Dashboard ]; then
              git clone https://github.com/rd20inc-beep/Clinic-Call-Dashboard.git ~/Clinic-Call-Dashboard
            fi
            cd ~/Clinic-Call-Dashboard
            git remote set-url origin https://github.com/rd20inc-beep/Clinic-Call-Dashboard.git
            git fetch origin main
            git reset --hard origin/main
            npm install --omit=dev
            pm2 delete clinicea-call 2>/dev/null || true
            pm2 start src/server.js --name clinicea-call
